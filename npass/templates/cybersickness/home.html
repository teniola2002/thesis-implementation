<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cybersickness Predictor</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --panel: #12121a;
      --border: #2a2a3a;
      --accent: #7fff6e;
      --accent2: #6e8fff;
      --text: #e8e8f0;
      --muted: #6a6a80;
      --danger: #ff6e6e;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(110,143,255,0.07) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(127,255,110,0.05) 0%, transparent 50%);
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    header {
      margin-bottom: 2.5rem;
    }

    .label-tag {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
      display: block;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.1;
      color: var(--text);
    }

    h1 span {
      color: var(--accent2);
    }

    .subtitle {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
    }

    .field {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    select, input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    select:focus, input[type="number"]:focus {
      border-color: var(--accent2);
    }

    select option {
      background: var(--panel);
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    button {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.9rem;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.88; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .result {
      margin-top: 1.5rem;
      padding: 1.25rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
      border: 1px solid;
      animation: fadeIn 0.3s ease;
    }

    .result.success {
      background: rgba(127,255,110,0.07);
      border-color: var(--accent);
      color: var(--accent);
      display: block;
    }

    .result.danger {
      background: rgba(255,110,110,0.07);
      border-color: var(--danger);
      color: var(--danger);
      display: block;
    }

    .result.error {
      background: rgba(255,180,100,0.07);
      border-color: #ffaa6e;
      color: #ffaa6e;
      display: block;
    }

    .result-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 0.3rem;
    }

    .result-message {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="label-tag">// Thesis Project</span>
      <h1>Cyber<span>sickness</span><br>Predictor</h1>
      <p class="subtitle">Enter participant data below to assess cybersickness risk using the trained ML model.</p>
    </header>

    <div class="card">
      <div class="field">
        <label for="gender">Gender</label>
        <div class="select-wrapper">
          <select id="gender">
            <option value="" disabled selected>Select gender</option>
            <option value="1">Male</option>
            <option value="0">Female</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="gad_score">GAD Score</label>
        <input type="number" id="gad_score" min="0" max="21" placeholder="0 – 21" />
      </div>

      <div class="field">
        <label for="task_condition">Task Condition</label>
        <div class="select-wrapper">
          <select id="task_condition">
            <option value="" disabled selected>Select condition</option>
            <option value="control">Control</option>
            <option value="0-back">0-back</option>
            <option value="2-back">2-back</option>
          </select>
        </div>
      </div>

      <hr class="divider"/>

      <button id="predict-btn" onclick="runPrediction()">Run Prediction</button>

      <div class="result" id="result">
        <div class="result-label">Result</div>
        <div class="result-message" id="result-message"></div>
      </div>
    </div>
  </div>

  <script>
    async function runPrediction() {
      const gender = document.getElementById("gender").value;
      const gad_score = document.getElementById("gad_score").value;
      const task_condition = document.getElementById("task_condition").value;
      const btn = document.getElementById("predict-btn");
      const resultBox = document.getElementById("result");
      const resultMsg = document.getElementById("result-message");

      if (gender === "" || gad_score === "" || task_condition === "") {
        resultBox.className = "result error";
        resultMsg.textContent = "Please fill in all fields.";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Analysing...";
      resultBox.className = "result";

      try {
        const res = await fetch("/api/predict/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            gender: parseInt(gender),
            gad_score: parseFloat(gad_score),
            task_condition: task_condition
          })
        });

        const data = await res.json();

        if (data.error) {
          resultBox.className = "result error";
          resultMsg.textContent = "Error: " + data.error;
        } else if (data.prediction === 1) {
          resultBox.className = "result danger";
          resultMsg.textContent = "⚠ Cybersickness Risk Detected";
        } else {
          resultBox.className = "result success";
          resultMsg.textContent = "✓ Low Cybersickness Risk";
        }

      } catch (e) {
        resultBox.className = "result error";
        resultMsg.textContent = "Could not connect to server.";
      }

      btn.disabled = false;
      btn.textContent = "Run Prediction";
    }
  </script>
</body>
</html>
